<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 280px;
    margin: 0;
    padding: 14px 16px;
    background: #15202b;
    color: #e7e9ea;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
  }
  h1 {
    font-size: 14px;
    margin: 0 0 10px 0;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 10px 0;
  }
  .label { font-weight: 600; }
  .status {
    color: #8b98a5;
    font-size: 12px;
    line-height: 1.5;
    border-top: 1px solid #38444d;
    padding-top: 10px;
    margin-top: 12px;
  }
  .status b { color: #e7e9ea; }
  .ok { color: rgb(0, 186, 124); }
  .warn { color: rgb(255, 196, 0); }
  /* Toggle switch */
  .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background-color: #536471; border-radius: 22px; transition: 0.2s;
  }
  .slider::before {
    content: ""; position: absolute; height: 18px; width: 18px;
    left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: 0.2s;
  }
  input:checked + .slider { background-color: #1d9bf0; }
  input:checked + .slider::before { transform: translateX(18px); }
</style>
</head>
<body>
  <h1>Konshu X Viewer</h1>
  <div class="row">
    <span class="label">Auto-renew topic snoozes</span>
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status">Loading…</div>
  <script src="popup.js"></script>
</body>
</html>
